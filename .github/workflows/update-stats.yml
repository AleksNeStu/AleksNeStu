name: Update repo stats

on:
  schedule:
    - cron: "17 */6 * * *"   # every 6h at :17
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-stats
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout badges branch (artifact branch, keeps main clean)
        uses: actions/checkout@v4
        with:
          ref: badges
          fetch-depth: 1

      - name: Refresh stats.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'PY'
          import json, os, urllib.request

          repo = "AleksNeStu/ai-real-estate-assistant"
          req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}",
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
                  "X-GitHub-Api-Version": "2022-11-28",
                  "User-Agent": "stats-action",
              },
          )
          data = json.load(urllib.request.urlopen(req))
          stats = {"stars": int(data["stargazers_count"]), "forks": int(data["forks_count"])}

          try:
              old = json.load(open("stats.json"))
          except Exception:
              old = None
          if old == stats:
              print(f"no change -> {stats}")
          else:
              with open("stats.json", "w") as f:
                  json.dump(stats, f)
                  f.write("\n")
              with open(os.environ["GITHUB_ENV"], "a") as f:
                  f.write("CHANGED=1\n")
              print(f"updated -> {stats}")
          PY

      - name: Commit
        if: env.CHANGED == '1'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stats.json
          git commit -m "chore(stats): refresh stars/forks [skip ci]"
          git push origin badges
