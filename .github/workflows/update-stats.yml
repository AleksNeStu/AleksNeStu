name: Update repo stats

on:
  schedule:
    - cron: "17 */6 * * *"   # every 6h at :17
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-stats
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Refresh stats.json & README count line
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'PY'
          import json, os, re, urllib.request

          repo = "AleksNeStu/ai-real-estate-assistant"
          req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}",
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
                  "X-GitHub-Api-Version": "2022-11-28",
                  "User-Agent": "stats-action",
              },
          )
          data = json.load(urllib.request.urlopen(req))
          stats = {"stars": int(data["stargazers_count"]), "forks": int(data["forks_count"])}

          changed = False

          # stats.json (source of truth for the badges)
          try:
              old = json.load(open("stats.json"))
          except Exception:
              old = None
          if old != stats:
              with open("stats.json", "w") as f:
                  json.dump(stats, f)
                  f.write("\n")
              changed = True

          # human-readable count line in README
          readme = open("README.md", encoding="utf-8").read()
          new_readme, n = re.subn(
              r"· \d+ stars · \d+ forks",
              f"· {stats['stars']} stars · {stats['forks']} forks",
              readme,
          )
          if n and new_readme != readme:
              open("README.md", "w", encoding="utf-8").write(new_readme)
              changed = True

          with open(os.environ["GITHUB_ENV"], "a") as f:
              f.write(f"CHANGED={'1' if changed else ''}\n")
          print(f"{stats['stars']} stars / {stats['forks']} forks -> changed={changed}")
          PY

      - name: Commit
        if: env.CHANGED == '1'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stats.json README.md
          git commit -m "chore(stats): refresh stars/forks [skip ci]"
          git push
